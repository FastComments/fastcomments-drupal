fastcomments.settings:
  type: config_object
  label: 'FastComments settings'
  mapping:
    tenant_id:
      type: string
      label: 'Tenant ID'
    api_secret:
      type: string
      label: 'API Secret'
    sso_mode:
      type: string
      label: 'SSO Mode'
    commenting_style:
      type: string
      label: 'Commenting Style'
    cdn_url:
      type: string
      label: 'CDN URL'
    site_url:
      type: string
      label: 'Site URL'

field.value.fastcomments_comment:
  type: mapping
  label: 'FastComments comment value'
  mapping:
    status:
      type: integer
      label: 'Commenting status'
    identifier:
      type: string
      label: 'Comment thread identifier'
