services:
  fastcomments.hooks:
    class: Drupal\fastcomments\Hook\FastCommentsHooks
    arguments: ['@entity_field.manager', '@config.factory', '@fastcomments.api_client']
  logger.channel.fastcomments:
    parent: logger.channel_base
    arguments: ['fastcomments']
  fastcomments.sso_service:
    class: Drupal\fastcomments\Service\FastCommentsSsoService
    arguments: ['@current_user', '@config.factory', '@entity_type.manager', '@file_url_generator', '@module_handler']
  fastcomments.widget_renderer:
    class: Drupal\fastcomments\Service\FastCommentsWidgetRenderer
    arguments: ['@config.factory', '@fastcomments.sso_service', '@language_manager']
  fastcomments.api_client:
    class: Drupal\fastcomments\Service\FastCommentsApiClient
    arguments: ['@http_client', '@config.factory', '@logger.channel.fastcomments']
